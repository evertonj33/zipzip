<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pra você Nayara❤️</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="conteudo-tela">
        <div id="ui">
            <div class="nome-centro">NAYARA ❤️</div>
        </div>
        
        <div class="botoes-container">
            <button id="btn-abrir">Clica aqui❤️</button>
        </div>
    </div>

    <div id="modal-galeria" class="modal">
        <div class="modal-conteudo">
            <span class="btn-fechar">&times;</span>
            
            <div class="galeria-container">
                <div class="fotos-coluna">
                    <img src="img2.jpg" alt="Nossa Foto 1">
                    <img src="img1.jpg" alt="Nossa Foto 2">
                    <img src="img3.jpg" alt="Nossa Foto 3">
                </div>
                
                <div class="frase-coluna">
                    <p>"Cada detalhe seu me faz ter a certeza de que você é a minha melhor escolha. Te amo!"</p>
                </div>
            </div>
        </div>
    </div>
    <script src="./main.js"></script>
</body>
</html>
